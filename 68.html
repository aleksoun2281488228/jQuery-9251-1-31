<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title></title>
    <script src="jquery-4.0.0.min.js"></script>
    <style>
        div {
            margin: 10px;
            padding: 5px;
            border: 2px solid green;
        }

        #wrapper {
            border-color: blueviolet;
            width: 300px;
        }
    </style>
</head>

<body>

    <div id="wrapper">
        <div id="test">text</div>
    </div>

    <p id="one"></p>
    <p id="two"></p>
    <p id="three"></p>
    <p id="four"></p>

    <script>
        $(document).ready(function () {
            let el = $('#wrapper');

            $('#one').text('Ширина контента: ' + el.width());

            $('#two').text('С учетом padding: ' + el.innerWidth());


            $('#three').text('С учетом padding и border: ' + el.outerWidth());


            $('#four').text('Полный размер с margin: ' + el.outerWidth(true));
        });
    </script>
</body>

</html>
