<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title></title>
    <script src="jquery-4.0.0.min.js"></script>
    <style>
        div {
            margin: 10px;
            padding: 5px;
            border: 2px solid green;
        }

        #wrapper {
            border-color: blueviolet;
        }
    </style>
</head>

<body>

    <div id="wrapper">
        <div id="test">text</div>
    </div>

    <p id="one"></p>
    <p id="two"></p>
    <p id="three"></p>
    <p id="four"></p>

    <script>
        $(document).ready(function () {

            let w = $('#wrapper').width();
            let h = $('#wrapper').height();

            $('#one').text('Ширина контента: ' + w + 'px, Высота контента: ' + h + 'px');
        });
    </script>
</body>

</html>
